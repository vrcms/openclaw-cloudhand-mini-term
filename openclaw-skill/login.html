<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudHand Terminal</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d1117;
      --bg-card: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --text-dim: #8b949e;
      --text-muted: #6e7681;
      --accent: #58a6ff;
      --green: #3fb950;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      display: flex; justify-content: center; align-items: center;
      height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
    }
    .container {
      text-align: center;
      max-width: 380px;
      padding: 0 20px;
    }
    .icon {
      font-size: 56px;
      margin-bottom: 20px;
      opacity: 0.8;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #58a6ff, #3fb950);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .subtitle {
      font-size: 14px;
      color: var(--text-dim);
      margin-bottom: 32px;
      line-height: 1.5;
    }
    .steps {
      text-align: left;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
    }
    .step {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 10px 0;
    }
    .step + .step {
      border-top: 1px solid var(--border);
    }
    .step-num {
      flex-shrink: 0;
      width: 24px; height: 24px;
      border-radius: 50%;
      background: rgba(88, 166, 255, 0.15);
      color: var(--accent);
      font-size: 12px; font-weight: 700;
      display: flex; justify-content: center; align-items: center;
    }
    .step-text {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.6;
    }
    .step-text strong {
      color: var(--text);
    }
    .footer {
      margin-top: 28px;
      font-size: 11px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">☁️</div>
    <h1>CloudHand Terminal</h1>
    <p class="subtitle">此页面需要通过本地客户端授权后访问</p>

    <div class="steps">
      <div class="step">
        <div class="step-num">1</div>
        <div class="step-text">在电脑上运行 <strong>CloudHand 客户端</strong></div>
      </div>
      <div class="step">
        <div class="step-num">2</div>
        <div class="step-text">在电脑右下角找到 <strong>☁️ CloudHand 托盘图标</strong></div>
      </div>
      <div class="step">
        <div class="step-num">3</div>
        <div class="step-text">点击托盘菜单中的 <strong>「打开设置」</strong>，完成配对连接</div>
      </div>
      <div class="step">
        <div class="step-num">4</div>
        <div class="step-text">连接成功后，浏览器会 <strong>自动跳转</strong> 并携带授权凭证</div>
      </div>
    </div>

    <div class="footer">CloudHand Terminal — 安全远程终端桥接服务</div>
  </div>
</body>
</html>
