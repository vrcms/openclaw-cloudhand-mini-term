<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Authentication</title>
  <style>
    :root {
      --bg: #0d1117;
      --border: #30363d;
      --text: #c9d1d9;
      --acc: #58a6ff;
      --err: #f85149;
    }
    body {
      margin: 0; padding: 0; background: var(--bg);
      display: flex; justify-content: center; align-items: center;
      height: 100vh; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .box {
      width: 260px;
    }
    input {
      width: 100%; box-sizing: border-box;
      padding: 12px; font-size: 16px; border-radius: 6px;
      border: 1px solid var(--border); background: #010409;
      color: var(--text); outline: none; transition: border-color 0.2s;
      text-align: center; letter-spacing: 2px;
    }
    input:focus { border-color: var(--acc); }
    input.error { border-color: var(--err); animation: shake 0.3s; }
    .msg {
      margin-top: 10px; font-size: 12px; color: var(--err);
      text-align: center; opacity: 0; transition: opacity 0.2s;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }
  </style>
</head>
<body>
  <div class="box">
    <input type="password" id="code" placeholder="Enter Access Code" autofocus autocomplete="off">
    <div class="msg" id="msg">Access Denied</div>
  </div>

  <script>
    const input = document.getElementById('code');
    const msg = document.getElementById('msg');
    let loading = false;

    input.addEventListener('keydown', async (e) => {
      if (e.key === 'Enter' && !loading) {
        const val = input.value.trim();
        if(!val) return;
        loading = true;
        input.disabled = true;
        input.classList.remove('error');
        msg.style.opacity = '0';

        try {
          const res = await fetch('/api/auth', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ pairCode: val })
          });
          
          if (res.ok) {
            window.location.reload();
          } else {
            throw new Error();
          }
        } catch (err) {
          input.value = '';
          input.classList.add('error');
          msg.textContent = 'Access Denied';
          msg.style.opacity = '1';
          setTimeout(() => input.focus(), 10);
        } finally {
          loading = false;
          input.disabled = false;
        }
      }
    });

    input.addEventListener('input', () => {
      input.classList.remove('error');
      msg.style.opacity = '0';
    });
  </script>
</body>
</html>
