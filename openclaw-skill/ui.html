<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudHand Terminal | 云手终端</title>
  <meta name="description" content="CloudHand 远程终端交互界面 — 多会话 + 多格布局">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #1c2128;
      --bg-hover: #1f2937;
      --border-color: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --accent: #58a6ff;
      --accent-dim: rgba(88,166,255,0.15);
      --accent-glow: rgba(88,166,255,0.3);
      --green: #3fb950;
      --green-dim: rgba(63,185,80,0.15);
      --green-glow: rgba(63,185,80,0.3);
      --red: #f85149;
      --yellow: #d29922;
      --purple: #bc8cff;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
      --topbar-h: 44px;
      --tabsbar-h: 38px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow:hidden; font-family:var(--font); background:var(--bg-primary); color:var(--text-primary); }

    /* 全局滚动条 */
    ::-webkit-scrollbar { width:6px; height:6px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:var(--border-color); border-radius:4px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--text-muted); }

    /* === App 框架 === */
    #app { display:flex; flex-direction:column; height:100vh; }

    /* === 顶部状态栏 === */
    .topbar {
      display:flex; align-items:center; justify-content:space-between;
      padding:0 16px; height:var(--topbar-h); min-height:var(--topbar-h);
      background:var(--bg-secondary); border-bottom:1px solid var(--border-color);
      flex-shrink:0;
    }
    .topbar-left { display:flex; align-items:center; gap:10px; }
    .logo { display:flex; align-items:center; gap:8px; }
    .logo-icon { font-size:20px; }
    .logo-text {
      font-size:15px; font-weight:700;
      background:linear-gradient(135deg, #58a6ff, #3fb950);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .conn-badge {
      display:flex; align-items:center; gap:6px;
      padding:4px 10px; border-radius:20px; font-size:11px; font-weight:500;
      background:var(--bg-tertiary); color:var(--text-muted); border:1px solid var(--border-color);
      transition:all .3s;
    }
    .conn-badge.connected { background:var(--green-dim); color:var(--green); border-color:rgba(63,185,80,.3); }
    .conn-dot { width:7px; height:7px; border-radius:50%; background:var(--text-muted); transition:all .3s; }
    .conn-badge.connected .conn-dot { background:var(--green); box-shadow:0 0 6px var(--green-glow); }

    /* 布局切换按钮组 */
    .layout-btns { display:flex; gap:4px; }
    .layout-btn {
      display:flex; align-items:center; justify-content:center;
      width:30px; height:26px; border-radius:5px; border:1px solid var(--border-color);
      background:var(--bg-tertiary); color:var(--text-muted); cursor:pointer;
      font-size:11px; font-family:var(--font); transition:all .2s;
      position:relative;
    }
    .layout-btn:hover { background:var(--bg-hover); color:var(--text-secondary); border-color:var(--text-muted); }
    .layout-btn.active { background:var(--accent-dim); color:var(--accent); border-color:var(--accent-glow); }
    /* 新建按钮 */
    .btn-new {
      padding:4px 10px; border-radius:6px; border:1px solid var(--border-color);
      background:var(--bg-tertiary); color:var(--text-secondary); cursor:pointer;
      font-size:12px; font-family:var(--font); transition:all .2s; margin-left:8px;
    }
    .btn-new:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
    .btn-new:active { transform:scale(.97); }
    .topbar-right { display:flex; align-items:center; gap:0; }

    /* === 顶部 Tabs 栏 === */
    .tabs-bar {
      display:flex; align-items:center;
      height:var(--tabsbar-h); min-height:var(--tabsbar-h);
      background:var(--bg-secondary); border-bottom:1px solid var(--border-color);
      padding:0 12px; gap:2px; overflow-x:auto; overflow-y:hidden;
      flex-shrink:0;
    }
    .tabs-bar::-webkit-scrollbar { height:3px; }

    /* Tab 单项 */
    .tab-item {
      display:flex; align-items:center; gap:6px;
      padding:5px 12px; border-radius:6px 6px 0 0;
      font-size:12px; font-weight:500; cursor:pointer; user-select:none;
      color:var(--text-muted); border:1px solid transparent; border-bottom:none;
      transition:all .15s; white-space:nowrap; flex-shrink:0;
      position:relative;
    }
    .tab-item:hover { background:var(--bg-hover); color:var(--text-secondary); }
    /* 在某个格子里展示时，高亮该 Tab（但不是 active-slot）*/
    .tab-item.in-slot { color:var(--text-secondary); border-color:var(--border-color); background:var(--bg-tertiary); }
    /* 当前激活格子的 Tab */
    .tab-item.in-slot.focused {
      background:var(--accent-dim); color:var(--accent);
      border-color:var(--accent-glow); border-bottom:1px solid var(--bg-primary);
    }
    .tab-dot {
      width:6px; height:6px; border-radius:50%;
      background:var(--text-muted); flex-shrink:0; transition:all .2s;
    }
    .tab-item.in-slot .tab-dot { background:var(--green); box-shadow:0 0 5px var(--green-glow); }
    .tab-item.in-slot.focused .tab-dot { background:var(--accent); box-shadow:0 0 5px var(--accent-glow); }
    .tab-name { max-width:100px; overflow:hidden; text-overflow:ellipsis; }
    .tab-slot-badge {
      font-size:9px; color:var(--text-muted); background:var(--bg-hover);
      border-radius:3px; padding:1px 4px; opacity:0.7;
    }
    .tab-item.in-slot.focused .tab-slot-badge { color:var(--accent); background:var(--accent-dim); opacity:1; }
    .tab-close {
      background:none; border:none; color:var(--text-muted); cursor:pointer;
      font-size:14px; padding:0 1px; opacity:0; transition:opacity .15s;
      line-height:1;
    }
    .tab-item:hover .tab-close { opacity:1; }
    .tab-close:hover { color:var(--red); }

    /* === 终端主区域 === */
    .terminal-panel {
      flex:1; display:grid; overflow:hidden;
      gap:4px; padding:4px; background:var(--bg-primary);
      transition:grid-template-columns .2s, grid-template-rows .2s;
    }

    /* 四种布局 */
    .terminal-panel.layout-single {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr;
    }
    .terminal-panel.layout-split-h {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr;
    }
    .terminal-panel.layout-split-v {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr 1fr;
    }
    .terminal-panel.layout-grid {
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
    }

    /* 格子（Slot） */
    .term-slot {
      position:relative; border-radius:6px; overflow:hidden;
      border:1px solid var(--border-color); background:var(--bg-primary);
      transition:border-color .15s, box-shadow .15s;
      cursor:pointer;
    }
    .term-slot.active-slot {
      border-color:var(--accent-glow);
      box-shadow:0 0 0 1px var(--accent-glow);
    }

    /* 格子内的终端实例 */
    .terminal-instance { position:absolute; inset:0; padding:6px; }
    .terminal-instance .xterm { height:100%; }

    /* 格子为空时的占位 */
    .slot-placeholder {
      position:absolute; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      color:var(--text-muted); gap:8px;
    }
    .slot-placeholder-icon { font-size:32px; opacity:.4; }
    .slot-placeholder-text { font-size:12px; }
    .slot-new-btn {
      padding:6px 14px; border-radius:6px; border:1px dashed var(--border-color);
      background:transparent; color:var(--text-muted); cursor:pointer;
      font-size:12px; font-family:var(--font); transition:all .2s;
    }
    .slot-new-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }

    /* Tab 占位（没有会话时整体空态） */
    .empty-tabs-hint {
      display:flex; align-items:center; gap:6px;
      font-size:12px; color:var(--text-muted); padding:0 8px;
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 顶部状态栏 -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="logo">
          <span class="logo-icon">☁️</span>
          <span class="logo-text">CloudHand Terminal</span>
        </div>
        <div class="conn-badge" id="connBadge">
          <span class="conn-dot"></span>
          <span id="connText">等待终端连接</span>
        </div>
      </div>
      <div class="topbar-right">
        <!-- 布局切换 -->
        <div class="layout-btns" id="layoutBtns">
          <button class="layout-btn active" data-layout="single" id="btnLayoutSingle" title="单终端">▣</button>
          <button class="layout-btn" data-layout="split-h" id="btnLayoutSplitH" title="左右分屏">⬛▐</button>
          <button class="layout-btn" data-layout="split-v" id="btnLayoutSplitV" title="上下分屏">▬</button>
          <button class="layout-btn" data-layout="grid" id="btnLayoutGrid" title="四格布局">⊞</button>
        </div>
        <button class="btn-new" id="btnNewSession" title="新建终端会话">＋ 新建</button>
      </div>
    </div>

    <!-- 顶部 Tabs 栏 -->
    <div class="tabs-bar" id="tabsBar">
      <span class="empty-tabs-hint" id="emptyTabsHint">☁️ 暂无会话，点击「新建」创建终端</span>
    </div>

    <!-- 终端区域（多格） -->
    <div class="terminal-panel layout-single" id="terminalPanel">
      <!-- 格子由 JS 动态生成 -->
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script>
  (function() {
    'use strict';

    // ======= 状态 =======
    let ws = null;
    // sessions: Map<id, { terminal, fitAddon, el(xterm挂载el), cwd, shell, createdAt }>
    const sessions = new Map();

    // 布局类型：single | split-h | split-v | grid
    let currentLayout = 'single';
    // 每种布局下的格子数量
    const LAYOUT_SLOT_COUNT = { single: 1, 'split-h': 2, 'split-v': 2, grid: 4 };

    // slots: Array<string|null>，每个格子存放 sessionId（或 null）
    let slots = [null];
    // 当前"激活"的格子索引（布局切换时或点击格子时变化）
    let activeSlotIdx = 0;

    // ======= DOM =======
    const connBadge    = document.getElementById('connBadge');
    const connText     = document.getElementById('connText');
    const btnNewSession= document.getElementById('btnNewSession');
    const tabsBar      = document.getElementById('tabsBar');
    const emptyHint    = document.getElementById('emptyTabsHint');
    const terminalPanel= document.getElementById('terminalPanel');
    const layoutBtns   = document.querySelectorAll('.layout-btn');

    // ======= WebSocket =======
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const token = document.cookie.match(/token=([^;]+)/)?.[1] || '';
      ws = new WebSocket(proto + '://' + location.host + '/ws/ui?token=' + token);
      ws.onopen  = () => console.log('[WS] 已连接中继');
      ws.onmessage = (e) => handleMessage(JSON.parse(e.data));
      ws.onclose = () => { console.log('[WS] 断开，3秒后重连...'); setTimeout(connectWS, 3000); };
      ws.onerror = () => {};
    }

    // ======= 消息处理 =======
    function handleMessage(msg) {
      switch (msg.type) {
        case 'init':
          updateConnectionStatus(msg.terminalConnected, msg.computer_name);
          break;
        case 'terminal_connected':
          updateConnectionStatus(true, msg.computer_name);
          break;
        case 'terminal_disconnected':
          updateConnectionStatus(false);
          break;
        case 'session_created':
          addSession(msg.sessionId, msg.cwd, msg.shell, msg.createdAt);
          // 自动放入当前激活格子
          assignToActiveSlot(msg.sessionId);
          break;
        case 'output': {
          const s = sessions.get(msg.sessionId);
          if (s && s.terminal) s.terminal.write(msg.data);
          break;
        }
        case 'session_closed':
        case 'session_exit':
          removeSession(msg.sessionId);
          break;
        case 'session_list':
          if (msg.sessions) {
            msg.sessions.forEach(s => {
              if (!sessions.has(s.id)) addSession(s.id, s.cwd, s.shell, s.createdAt);
            });
            // 将已有会话依次填入格子
            fillSlotsFromExisting();
            renderAll();
          }
          break;
        case 'error':
          console.error('⚠️ ' + msg.message);
          break;
      }
    }

    // ======= 连接状态 =======
    function updateConnectionStatus(connected, computerName) {
      if (connected) {
        connBadge.classList.add('connected');
        connText.textContent = computerName ? '已连接: ' + computerName : '终端已连接';
        if (computerName) document.title = computerName + ' | CloudHand Terminal';
      } else {
        connBadge.classList.remove('connected');
        connText.textContent = '等待终端连接';
        document.title = 'CloudHand Terminal | 云手终端';
      }
    }

    // ======= 终端会话管理 =======
    function addSession(id, cwd, shell, createdAtRemote) {
      if (sessions.has(id)) return;

      // 创建 xterm 容器 div（先不挂载到 slot）
      const mountEl = document.createElement('div');
      mountEl.className = 'terminal-instance';
      mountEl.id = 'term-' + id;
      // 暂存到 body 不可见区域
      mountEl.style.cssText = 'position:absolute;visibility:hidden;pointer-events:none;width:600px;height:400px;';
      document.body.appendChild(mountEl);

      const terminal = new Terminal({
        cursorBlink: true, fontSize: 14,
        fontFamily: "'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace",
        theme: {
          background: '#0d1117', foreground: '#e6edf3', cursor: '#58a6ff',
          selectionBackground: '#264f78',
          black: '#484f58', red: '#ff7b72', green: '#3fb950', yellow: '#d29922',
          blue: '#58a6ff', magenta: '#bc8cff', cyan: '#39d353', white: '#b1bac4',
          brightBlack: '#6e7681', brightRed: '#ffa198', brightGreen: '#56d364',
          brightYellow: '#e3b341', brightBlue: '#79c0ff', brightMagenta: '#d2a8ff',
          brightCyan: '#56d364', brightWhite: '#f0f6fc'
        }
      });
      const fitAddon = new FitAddon.FitAddon();
      terminal.loadAddon(fitAddon);
      terminal.open(mountEl);

      terminal.onData((data) => {
        if (ws && ws.readyState === WebSocket.OPEN)
          ws.send(JSON.stringify({ type: 'input', sessionId: id, data }));
      });
      terminal.onResize(({ cols, rows }) => {
        if (ws && ws.readyState === WebSocket.OPEN)
          ws.send(JSON.stringify({ type: 'resize', sessionId: id, cols, rows }));
      });

      let cTime = localStorage.getItem('termTime_' + id);
      if (!cTime) {
        cTime = createdAtRemote || Date.now();
        localStorage.setItem('termTime_' + id, cTime);
      }

      sessions.set(id, { terminal, fitAddon, mountEl, cwd, shell, createdAt: parseInt(cTime) });
    }

    function removeSession(id) {
      const s = sessions.get(id);
      if (s) {
        s.terminal.dispose();
        s.mountEl.remove();
        sessions.delete(id);
      }
      localStorage.removeItem('termName_' + id);
      localStorage.removeItem('termTime_' + id);
      // 从格子中移除
      slots = slots.map(sid => sid === id ? null : sid);
      renderAll();
    }

    // ======= 格子（Slot）管理 =======

    /** 将 sessionId 放入当前激活格子 */
    function assignToActiveSlot(sessionId) {
      slots[activeSlotIdx] = sessionId;
      renderAll();
      // 让该格子对应的终端获得焦点
      const s = sessions.get(sessionId);
      if (s) {
        setTimeout(() => { s.fitAddon.fit(); s.terminal.focus(); }, 50);
      }
    }

    /** 初始加载：已有会话依次填充格子 */
    function fillSlotsFromExisting() {
      const ids = Array.from(sessions.keys());
      for (let i = 0; i < slots.length; i++) {
        if (!slots[i] && ids.length > 0) slots[i] = ids.shift();
      }
    }

    /**
     * 点击 Tab 的处理逻辑：
     * - 如果该 sessionId 已在某格中显示 → 激活那个格子
     * - 否则 → 替换当前激活格子
     */
    function onTabClick(sessionId) {
      const existingIdx = slots.indexOf(sessionId);
      if (existingIdx !== -1) {
        // 已在某格，激活那个格子
        setActiveSlot(existingIdx);
      } else {
        // 替换当前激活格子
        slots[activeSlotIdx] = sessionId;
        renderAll();
        const s = sessions.get(sessionId);
        if (s) setTimeout(() => { s.fitAddon.fit(); s.terminal.focus(); }, 50);
      }
    }

    function setActiveSlot(idx) {
      activeSlotIdx = idx;
      // 更新格子激活状态
      document.querySelectorAll('.term-slot').forEach((el, i) => {
        el.classList.toggle('active-slot', i === idx);
      });
      renderTabs();
      // 聚焦
      const sid = slots[idx];
      if (sid) {
        const s = sessions.get(sid);
        if (s) { s.fitAddon.fit(); s.terminal.focus(); }
      }
    }

    // ======= 布局切换 =======
    function setLayout(layout) {
      currentLayout = layout;
      const count = LAYOUT_SLOT_COUNT[layout];
      // 补充或裁剪 slots 数组
      while (slots.length < count) slots.push(null);
      if (slots.length > count) slots = slots.slice(0, count);
      // 激活格子不能超出范围
      if (activeSlotIdx >= count) activeSlotIdx = count - 1;
      // 更新面板 class
      terminalPanel.className = 'terminal-panel layout-' + layout;
      // 更新按钮状态
      layoutBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.layout === layout));
      renderAll();
    }

    // ======= 渲染总入口 =======
    function renderAll() {
      renderSlots();
      renderTabs();
    }

    /** 渲染格子区域 */
    function renderSlots() {
      const count = LAYOUT_SLOT_COUNT[currentLayout];
      // 清空面板（但不销毁终端 DOM，它们在 body 临时区）
      terminalPanel.innerHTML = '';

      for (let i = 0; i < count; i++) {
        const slotEl = document.createElement('div');
        slotEl.className = 'term-slot' + (i === activeSlotIdx ? ' active-slot' : '');
        slotEl.id = 'slot-' + i;

        const sid = slots[i];
        if (sid && sessions.has(sid)) {
          // 将终端 mountEl 移动到格子中
          const s = sessions.get(sid);
          // 重置临时样式
          s.mountEl.style.cssText = '';
          slotEl.appendChild(s.mountEl);
          // 异步 fit
          setTimeout(() => { try { s.fitAddon.fit(); } catch(e){} }, 30);
        } else {
          // 空态占位
          const ph = document.createElement('div');
          ph.className = 'slot-placeholder';
          ph.innerHTML = `
            <div class="slot-placeholder-icon">⌨️</div>
            <div class="slot-placeholder-text">此格子为空</div>
            <button class="slot-new-btn" data-slot="${i}">＋ 新建终端</button>
          `;
          ph.querySelector('.slot-new-btn').addEventListener('click', (e) => {
            e.stopPropagation();
            // 新建前先激活这个格子
            activeSlotIdx = i;
            if (ws && ws.readyState === WebSocket.OPEN)
              ws.send(JSON.stringify({ type: 'create_session' }));
          });
          slotEl.appendChild(ph);
        }

        // 点击格子 → 激活
        slotEl.addEventListener('click', () => setActiveSlot(i));

        terminalPanel.appendChild(slotEl);
      }
    }

    /** 渲染顶部 Tabs */
    function renderTabs() {
      tabsBar.innerHTML = '';
      if (sessions.size === 0) {
        tabsBar.appendChild(emptyHint);
        return;
      }

      for (const [id, s] of sessions) {
        const slotIdx = slots.indexOf(id);
        const inSlot = slotIdx !== -1;
        const isFocused = inSlot && slotIdx === activeSlotIdx;

        const tab = document.createElement('div');
        tab.className = 'tab-item' + (inSlot ? ' in-slot' : '') + (isFocused ? ' focused' : '');
        tab.title = s.cwd || id;

        const shortName = localStorage.getItem('termName_' + id)
          || (s.cwd ? (s.cwd.replace(/^.*[\\/]/, '') || s.cwd) : 'Terminal');

        // 格子编号徽章
        const slotBadge = inSlot ? `<span class="tab-slot-badge">${slotIdx + 1}</span>` : '';

        tab.innerHTML = `
          <span class="tab-dot"></span>
          <span class="tab-name" title="${shortName}">${shortName}</span>
          ${slotBadge}
          <button class="tab-close" data-id="${id}" title="关闭会话">×</button>
        `;

        tab.addEventListener('click', (e) => {
          if (e.target.closest('.tab-close')) return;
          onTabClick(id);
        });
        tab.querySelector('.tab-close').addEventListener('click', (e) => {
          e.stopPropagation();
          if (ws && ws.readyState === WebSocket.OPEN)
            ws.send(JSON.stringify({ type: 'close_session', sessionId: id }));
        });

        // 双击重命名
        tab.querySelector('.tab-name').addEventListener('dblclick', (e) => {
          e.stopPropagation();
          const cur = localStorage.getItem('termName_' + id) || shortName;
          const p = prompt('请输入会话名称（为空则恢复默认）:', cur);
          if (p !== null) {
            if (p.trim()) localStorage.setItem('termName_' + id, p.trim());
            else localStorage.removeItem('termName_' + id);
            renderTabs();
          }
        });

        tabsBar.appendChild(tab);
      }
    }

    // ======= 新建会话 =======
    btnNewSession.addEventListener('click', () => {
      if (ws && ws.readyState === WebSocket.OPEN)
        ws.send(JSON.stringify({ type: 'create_session' }));
    });

    // ======= 布局按钮 =======
    document.getElementById('layoutBtns').addEventListener('click', (e) => {
      const btn = e.target.closest('.layout-btn');
      if (!btn) return;
      setLayout(btn.dataset.layout);
    });

    // ======= 窗口 Resize =======
    window.addEventListener('resize', () => {
      slots.forEach(sid => {
        if (sid) {
          const s = sessions.get(sid);
          if (s) try { s.fitAddon.fit(); } catch(e){}
        }
      });
    });

    // ======= 初始化布局 =======
    setLayout('single');

    // ======= 启动 WebSocket =======
    connectWS();
  })();
  </script>
</body>
</html>
