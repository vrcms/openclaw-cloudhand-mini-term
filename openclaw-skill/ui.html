<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudHand Terminal | 云手终端</title>
  <meta name="description" content="CloudHand 远程终端交互界面 — AI 对话 + 终端操作">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #1c2128;
      --bg-hover: #1f2937;
      --border-color: #30363d;
      --text-primary: #e6edf3;
      --text-secondary: #8b949e;
      --text-muted: #6e7681;
      --accent: #58a6ff;
      --accent-dim: rgba(88,166,255,0.15);
      --accent-glow: rgba(88,166,255,0.3);
      --green: #3fb950;
      --green-dim: rgba(63,185,80,0.15);
      --green-glow: rgba(63,185,80,0.3);
      --red: #f85149;
      --yellow: #d29922;
      --purple: #bc8cff;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; overflow:hidden; font-family:var(--font); background:var(--bg-primary); color:var(--text-primary); }

    /* 全局滚动条美化 */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* 全局布局 */
    #app { display:flex; flex-direction:column; height:100vh; }

    /* 顶部状态栏 */
    .topbar {
      display:flex; align-items:center; justify-content:space-between;
      padding:0 16px; height:44px; min-height:44px;
      background:var(--bg-secondary); border-bottom:1px solid var(--border-color);
    }
    .topbar-left { display:flex; align-items:center; gap:10px; }
    .logo { display:flex; align-items:center; gap:8px; }
    .logo-icon { font-size:20px; }
    .logo-text {
      font-size:15px; font-weight:700;
      background:linear-gradient(135deg, #58a6ff, #3fb950);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }
    .conn-badge {
      display:flex; align-items:center; gap:6px;
      padding:4px 10px; border-radius:20px; font-size:11px; font-weight:500;
      background:var(--bg-tertiary); color:var(--text-muted); border:1px solid var(--border-color);
      transition:all .3s;
    }
    .conn-badge.connected { background:var(--green-dim); color:var(--green); border-color:rgba(63,185,80,.3); }
    .conn-dot { width:7px; height:7px; border-radius:50%; background:var(--text-muted); transition:all .3s; }
    .conn-badge.connected .conn-dot { background:var(--green); box-shadow:0 0 6px var(--green-glow); }
    .topbar-right { display:flex; gap:8px; }
    .btn {
      padding:5px 12px; border-radius:6px; border:1px solid var(--border-color);
      background:var(--bg-tertiary); color:var(--text-secondary); cursor:pointer;
      font-size:12px; font-family:var(--font); transition:all .2s;
    }
    .btn:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
    .btn:active { transform:scale(.97); }

    /* 主体区域（左右分栏） */
    .main { display:flex; flex:1; overflow:hidden; }

    /* 左侧对话面板/会话面板（包含边框） */
    .chat-panel {
      width:320px; min-width:320px;
      display:flex; flex-direction:column;
      background:var(--bg-secondary); border-right:1px solid var(--border-color);
    }

    /* 左侧边栏：会话列表 */
    .session-panel {
      flex: 1; display:flex; flex-direction:column; overflow:hidden;
    }
    .session-panel-header {
      padding:12px 16px; font-size:12px; font-weight:600;
      text-transform:uppercase; letter-spacing:.5px; color:var(--text-muted);
      display:flex; justify-content:space-between; align-items:center;
      border-bottom: 1px solid var(--border-color);
    }
    .session-list { overflow-y:auto; padding:0 8px 8px; }
    .session-item {
      display:flex; align-items:flex-start; justify-content:space-between;
      padding:8px 10px; border-radius:6px; cursor:pointer; margin-top: 4px;
      font-size:12px; color:var(--text-secondary); transition:all .15s;
    }
    .session-item:hover { background:var(--bg-hover); }
    .session-item.active { background:var(--accent-dim); box-shadow:0 0 0 1px var(--accent-glow); }

    .session-info { display: flex; flex-direction: column; flex: 1; min-width: 0; gap: 4px; padding-right: 6px; }
    .session-main { display: flex; align-items: center; gap: 6px; }
    .session-name { font-size: 13px; font-weight: 500; color: var(--text-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; user-select: none; }
    .edit-name-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; opacity: 0; font-size: 11px; padding: 0 2px; }
    .session-item:hover .edit-name-btn { opacity: 1; }
    .edit-name-btn:hover { color: var(--accent); }

    .session-meta { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-muted); }
    .session-time { white-space: nowrap; background: rgba(0,0,0,0.2); padding: 1px 4px; border-radius: 4px; }
    .session-path { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; direction: rtl; text-align: left; }

    .session-close-btn {
      background:none; border:none; color:var(--text-muted); cursor:pointer;
      font-size:16px; padding:0 4px; opacity:0; transition:all .15s; margin-top: -2px;
    }
    .session-item:hover .session-close-btn { opacity:1; }
    .session-close-btn:hover { color:var(--red); transform: scale(1.1); }

    /* 右侧终端区域 */
    .terminal-panel { flex:1; display:flex; flex-direction:column; overflow:hidden; position:relative; }
    .terminal-container { flex:1; position:relative; }
    .terminal-instance { position:absolute; inset:0; padding:8px; }
    .terminal-instance.hidden { display:none; }
    .terminal-instance .xterm { height:100%; }

    .terminal-placeholder {
      position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
      color:var(--text-muted); text-align:center;
    }
    .terminal-placeholder.hidden { display:none; }
    .placeholder-icon { font-size:42px; margin-bottom:12px; opacity:.5; }
    .placeholder-title { font-size:16px; font-weight:600; color:var(--text-secondary); margin-bottom:6px; }
    .placeholder-desc { font-size:12px; color:var(--text-muted); }

    /* 响应式 */
    @media (max-width: 768px) {
      .chat-panel { width:100%; min-width:unset; max-height:40vh; border-right:none; border-bottom:1px solid var(--border-color); }
      .main { flex-direction:column; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- 顶部状态栏 -->
    <div class="topbar">
      <div class="topbar-left">
        <div class="logo">
          <span class="logo-icon">☁️</span>
          <span class="logo-text">CloudHand Terminal</span>
        </div>
        <div class="conn-badge" id="connBadge">
          <span class="conn-dot"></span>
          <span id="connText">等待终端连接</span>
        </div>
      </div>
      <div class="topbar-right">
        <!-- 移至左侧边栏 -->
      </div>
    </div>

    <!-- 主体区域 -->
    <div class="main">
      <!-- 左侧边栏 -->
      <div class="chat-panel">
        <div class="session-panel">
          <div class="session-panel-header">
            <span>📋 会话列表</span>
            <button class="btn" id="btnNewSession" title="新建终端会话" style="padding: 2px 8px; font-size: 11px; font-weight: 500;">+ 新建</button>
          </div>
          <div class="session-list" id="sessionList"></div>
        </div>
      </div>

      <!-- 右侧终端 -->
      <div class="terminal-panel">
        <div class="terminal-container" id="terminalContainer">
          <div class="terminal-placeholder" id="termPlaceholder">
            <div>
              <div class="placeholder-icon">⌨️</div>
              <div class="placeholder-title">等待终端连接</div>
              <div class="placeholder-desc">本地应用连接后，终端将自动显示</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
  <script>
  (function() {
    'use strict';

    // ---- 状态 ----
    let ws = null;
    const sessions = new Map(); // sessionId → { terminal, fitAddon, el }
    let activeSessionId = null;

    // ---- DOM 引用 ----
    const connBadge = document.getElementById('connBadge');
    const connText = document.getElementById('connText');
    const btnNewSession = document.getElementById('btnNewSession');
    const sessionListEl = document.getElementById('sessionList');
    const terminalContainer = document.getElementById('terminalContainer');
    const termPlaceholder = document.getElementById('termPlaceholder');

    // ---- WebSocket 连接 ----
    function connectWS() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const token = document.cookie.match(/token=([^;]+)/)?.[1] || '';
      ws = new WebSocket(proto + '://' + location.host + '/ws/ui?token=' + token);

      ws.onopen = () => console.log('[WS] 已连接中继');

      ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        handleMessage(msg);
      };

      ws.onclose = () => {
        console.log('[WS] 断开，3秒后重连...');
        setTimeout(connectWS, 3000);
      };

      ws.onerror = () => {};
    }

    // ---- 消息处理 ----
    function handleMessage(msg) {
      switch (msg.type) {
        case 'init':
          updateConnectionStatus(msg.terminalConnected, msg.computer_name);
          break;

        case 'terminal_connected':
          updateConnectionStatus(true, msg.computer_name);
          break;

        case 'terminal_disconnected':
          updateConnectionStatus(false);
          break;

        case 'chat':
          // 聊天功能已被移除前端界面
          break;

        case 'session_created':
          addSession(msg.sessionId, msg.cwd, msg.shell, msg.createdAt);
          switchSession(msg.sessionId);
          break;

        case 'output': {
          const s = sessions.get(msg.sessionId);
          if (s && s.terminal) s.terminal.write(msg.data);
          break;
        }

        case 'session_closed':
        case 'session_exit':
          removeSession(msg.sessionId);
          break;

        case 'session_list':
          if (msg.sessions) {
            msg.sessions.forEach(s => {
              if (!sessions.has(s.id)) addSession(s.id, s.cwd, s.shell, s.createdAt);
            });
            if (msg.sessions.length > 0 && !activeSessionId) switchSession(msg.sessions[0].id);
          }
          break;

        case 'error':
          console.error('⚠️ ' + msg.message);
          break;
      }
    }

    // ---- 连接状态 ----
    function updateConnectionStatus(connected, computerName) {
      if (connected) {
        connBadge.classList.add('connected');
        connText.textContent = computerName ? '已连接: ' + computerName : '终端已连接';
        if (computerName) document.title = computerName + ' | CloudHand Terminal';
      } else {
        connBadge.classList.remove('connected');
        connText.textContent = '等待终端连接';
        document.title = 'CloudHand Terminal | 云手终端';
      }
    }

    // ---- 终端会话 ----
    function addSession(id, cwd, shell, createdAtRemote) {
      if (sessions.has(id)) return;

      const terminal = new Terminal({
        cursorBlink: true,
        fontSize: 14,
        fontFamily: "'Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace",
        theme: {
          background: '#0d1117', foreground: '#e6edf3', cursor: '#58a6ff',
          selectionBackground: '#264f78',
          black: '#484f58', red: '#ff7b72', green: '#3fb950', yellow: '#d29922',
          blue: '#58a6ff', magenta: '#bc8cff', cyan: '#39d353', white: '#b1bac4',
          brightBlack: '#6e7681', brightRed: '#ffa198', brightGreen: '#56d364',
          brightYellow: '#e3b341', brightBlue: '#79c0ff', brightMagenta: '#d2a8ff',
          brightCyan: '#56d364', brightWhite: '#f0f6fc'
        }
      });

      const fitAddon = new FitAddon.FitAddon();
      terminal.loadAddon(fitAddon);

      const el = document.createElement('div');
      el.className = 'terminal-instance hidden';
      el.id = 'term-' + id;
      terminalContainer.appendChild(el);
      terminal.open(el);

      // 终端输入 → 发送到中继
      terminal.onData((data) => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'input', sessionId: id, data: data }));
        }
      });

      // 尺寸变化
      terminal.onResize(({ cols, rows }) => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'resize', sessionId: id, cols, rows }));
        }
      });

      // 持久化时间和名字缓存逻辑依赖机制
      let cTime = localStorage.getItem('termTime_' + id);
      if (!cTime) {
        cTime = createdAtRemote || Date.now();
        localStorage.setItem('termTime_' + id, cTime);
      }

      sessions.set(id, { terminal, fitAddon, el, cwd, shell, createdAt: parseInt(cTime) });
      renderSessionList();
    }

    function removeSession(id) {
      const s = sessions.get(id);
      if (s) { s.terminal.dispose(); s.el.remove(); sessions.delete(id); }
      
      localStorage.removeItem('termName_' + id);
      localStorage.removeItem('termTime_' + id);

      if (activeSessionId === id) {
        activeSessionId = null;
        const remaining = Array.from(sessions.keys());
        if (remaining.length > 0) switchSession(remaining[0]);
        else termPlaceholder.classList.remove('hidden');
      }
      renderSessionList();
    }

    function switchSession(id) {
      if (activeSessionId) {
        const old = sessions.get(activeSessionId);
        if (old) old.el.classList.add('hidden');
      }
      const s = sessions.get(id);
      if (s) {
        termPlaceholder.classList.add('hidden');
        s.el.classList.remove('hidden');
        s.fitAddon.fit();
        s.terminal.focus();
        activeSessionId = id;
      }
      renderSessionList();
    }

    function renderSessionList() {
      sessionListEl.innerHTML = '';
      for (const [id, s] of sessions) {
        const item = document.createElement('div');
        item.className = 'session-item' + (id === activeSessionId ? ' active' : '');
        
        const fullCwd = s.cwd || '~';
        const shortCwd = s.cwd ? s.cwd.replace(/^.*[\\\\/]/, '') || s.cwd : '~';
        const cName = localStorage.getItem('termName_' + id) || shortCwd;
        
        const t = new Date(s.createdAt);
        const timeStr = t.getHours().toString().padStart(2, '0') + ':' + t.getMinutes().toString().padStart(2, '0');

        item.innerHTML = `
          <div class="session-info">
            <div class="session-main">
              <span class="session-name" title="双击重新命名当前会话">${cName}</span>
              <button class="edit-name-btn" data-id="${id}" title="修改名称">✎</button>
            </div>
            <div class="session-meta">
              <span class="session-time">${timeStr}</span>
              <span class="session-path" title="${fullCwd}">${fullCwd}</span>
            </div>
          </div>
          <button class="session-close-btn" data-id="${id}" title="关闭会话">×</button>
        `;

        item.addEventListener('click', (e) => {
          if (e.target.closest('.session-close-btn') || e.target.closest('.edit-name-btn')) return;
          switchSession(id);
        });

        // 修改名称
        const btnEdit = item.querySelector('.edit-name-btn');
        btnEdit.addEventListener('click', (e) => {
          e.stopPropagation();
          const p = prompt('请输入会话名称（为空则恢复默认）:', cName);
          if (p !== null) {
            const val = p.trim();
            if (val) localStorage.setItem('termName_' + id, val);
            else localStorage.removeItem('termName_' + id);
            renderSessionList();
          }
        });

        // 允许双击名字直接修改
        item.querySelector('.session-name').addEventListener('dblclick', (e) => {
          e.stopPropagation();
          btnEdit.click();
        });

        // 关闭指令
        item.querySelector('.session-close-btn').addEventListener('click', (e) => {
          e.stopPropagation();
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'close_session', sessionId: id }));
          }
        });
        sessionListEl.appendChild(item);
      }
    }

    // 新建会话
    btnNewSession.addEventListener('click', () => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ type: 'create_session' }));
      }
    });

    // 窗口大小变化
    window.addEventListener('resize', () => {
      if (activeSessionId) {
        const s = sessions.get(activeSessionId);
        if (s && s.fitAddon) s.fitAddon.fit();
      }
    });

    // ---- 启动 ----
    connectWS();
  })();
  </script>
</body>
</html>
