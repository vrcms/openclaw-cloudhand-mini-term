<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CloudHand Mini-Term | 云手终端</title>
  <meta name="description" content="远程 AI 智能体终端管理应用">
  <link rel="stylesheet" href="/lib/xterm/xterm.css">
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div id="app">
    <!-- 左侧边栏 -->
    <aside id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <span class="logo-icon">☁️</span>
          <span class="logo-text">云手终端</span>
        </div>
        <div class="remote-status" id="remoteStatus">
          <span class="status-dot"></span>
          <span class="status-text">等待连接</span>
        </div>
      </div>

      <div class="session-list-header">
        <span>会话列表</span>
        <button id="newSessionBtn" class="btn-icon" title="新建会话">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 2v12M2 8h12" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="session-list" id="sessionList">
        <!-- 动态会话列表 -->
      </div>

      <div class="sidebar-footer">
        <div class="pair-code-section">
          <div class="pair-code-label">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" style="vertical-align: -2px;">
              <path d="M8 1a4 4 0 0 0-4 4v3H3a1 1 0 0 0-1 1v5a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V9a1 1 0 0 0-1-1h-1V5a4 4 0 0 0-4-4zm-2.5 4a2.5 2.5 0 0 1 5 0v3h-5V5z"/>
            </svg>
            配对码
          </div>
          <div class="pair-code-value" id="pairCode">------</div>
          <div class="pair-code-timer" id="pairTimer">--:--</div>
        </div>
      </div>
    </aside>

    <!-- 右侧终端区域 -->
    <main id="main-content">
      <div id="terminal-placeholder">
        <div class="placeholder-content">
          <div class="placeholder-icon">⌨️</div>
          <h2>欢迎使用云手终端</h2>
          <p>点击左上角 <strong>+</strong> 创建新会话，或等待远程客户端连入</p>
        </div>
      </div>
      <div id="terminal-wrapper"></div>
    </main>
  </div>

  <script src="/js/bundle.js"></script>
</body>
</html>
